name: Lint source
description: Run the repository's Markdown source checks.

runs:
  using: composite
  steps:
    - name: Lint Markdown
      uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9 # v23.0.0
      with:
        config: .markdownlint-cli2.yaml
        globs: "**/*.md"
