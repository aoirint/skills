name: Generate Version
description: "Generate application and git version based on csproj version and git tags."

inputs:
  csproj_file:
    # This file must contain APP_VERSION_MARKER immediately before <Version>;
    # the marker avoids broad XML edits while keeping the action shell-only.
    description: 'csproj file path'
    required: true
  release_mode:
    description: 'Resolved release mode override from the plan job.'
    required: false
    default: ''
  app_version:
    description: 'Resolved application version override from the plan job.'
    required: false
    default: ''
  manifest_version:
    description: 'Resolved manifest version override from the plan job.'
    required: false
    default: ''
  write_files:
    description: 'Whether to write the resolved versions into package source files.'
    required: false
    default: 'true'

outputs:
  release_mode:
    description: 'latest, prerelease, edge'
    value: ${{ steps.release-mode.outputs.mode }}
  app_version:
    description: 'Application version'
    value: ${{ steps.app-version.outputs.version }}
  git_version:
    description: 'Git tag version'
    value: ${{ steps.git-version.outputs.version }}
  manifest_version:
    description: 'Thunderstore manifest version_number'
    value: ${{ steps.manifest-version.outputs.version }}

runs:
  using: "composite"

  steps:
    - name: Extract csproj version
      id: csproj-version
      shell: bash
      run: |
        # Read only the marker-adjacent Version element so unrelated XML
        # metadata does not affect release classification.
        CSPROJ_VERSION=$(sed -n '/APP_VERSION_MARKER/{n; s|<Version>\(.*\)</Version>|\1|; p;}' "${{ inputs.csproj_file }}" | tr -d '\r' | xargs)
        if [ -z "${CSPROJ_VERSION}" ]; then
          echo "Could not find a Version element after APP_VERSION_MARKER in ${{ inputs.csproj_file }}." >&2
          exit 1
        fi
        echo "version=${CSPROJ_VERSION}" >> "${GITHUB_OUTPUT}"

    - name: Check release mode
      id: release-mode
      shell: bash
      run: |
        if [ -n "${{ inputs.release_mode }}" ]; then
          echo "mode=${{ inputs.release_mode }}" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        CSPROJ_VERSION="${{ steps.csproj-version.outputs.version }}"

        # Tags are fetched here, not by checkout, because release mode depends
        # on the remote tag set at the moment the build runs.
        git fetch --tags
        if git rev-parse "refs/tags/v${CSPROJ_VERSION}" >/dev/null 2>&1; then
          echo "mode=edge" >> "${GITHUB_OUTPUT}"
        elif [[ "${CSPROJ_VERSION}" == "0.0.0" ]]; then
          # Keep the placeholder development version from publishing releases.
          echo "mode=edge" >> "${GITHUB_OUTPUT}"
        elif [[ "${CSPROJ_VERSION}" == *"-"* ]]; then
          echo "mode=prerelease" >> "${GITHUB_OUTPUT}"
        else
          echo "mode=latest" >> "${GITHUB_OUTPUT}"
        fi

    - name: Generate app version
      id: app-version
      shell: bash
      run: |
        if [ -n "${{ inputs.app_version }}" ]; then
          echo "version=${{ inputs.app_version }}" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        CSPROJ_VERSION="${{ steps.csproj-version.outputs.version }}"
        RELEASE_MODE="${{ steps.release-mode.outputs.mode }}"

        if [ "${RELEASE_MODE}" = "edge" ]; then
          # Edge artifacts need globally unique SemVer-compatible versions so
          # repeated main-branch builds do not collide with published packages.
          DATE_STRING=$(date -u "+%Y-%m-%dT%H-%M-%SZ")
          SHA_SHORT="${GITHUB_SHA:0:7}"
          APP_VERSION="${CSPROJ_VERSION}-edge.${DATE_STRING}.${SHA_SHORT}"
        else
          APP_VERSION="${CSPROJ_VERSION}"
        fi

        echo "version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"

    - name: Generate git version
      id: git-version
      shell: bash
      run: |
        APP_VERSION="${{ steps.app-version.outputs.version }}"
        echo "version=v${APP_VERSION}" >> "${GITHUB_OUTPUT}"

    - name: Generate manifest version
      id: manifest-version
      shell: bash
      run: |
        if [ -n "${{ inputs.manifest_version }}" ]; then
          echo "version=${{ inputs.manifest_version }}" >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        RELEASE_MODE="${{ steps.release-mode.outputs.mode }}"

        if [ "${RELEASE_MODE}" = "latest" ]; then
          MANIFEST_VERSION="${{ steps.app-version.outputs.version }}"
        else
          # Thunderstore-style package metadata does not carry prerelease or
          # edge identity. Keep release identity in the project version,
          # artifact name, and Git tag instead.
          MANIFEST_VERSION="0.0.0"
        fi

        echo "version=${MANIFEST_VERSION}" >> "${GITHUB_OUTPUT}"

    - name: Replace version in csproj
      if: inputs.write_files == 'true'
      shell: bash
      run: |
        # The generated version is written back before build so the compiled
        # assembly and package metadata describe the same artifact.
        APP_VERSION="${{ steps.app-version.outputs.version }}"
        sed -i "/APP_VERSION_MARKER/{n; s|<Version>.*</Version>|<Version>${APP_VERSION}</Version>|;}" "${{ inputs.csproj_file }}"

    - name: Replace version in manifest.json
      if: inputs.write_files == 'true'
      shell: bash
      run: |
        # Thunderstore reads version_number from the manifest inside the zip.
        # Stable releases use the app version; prerelease and edge artifacts keep
        # a conservative placeholder because they are GitHub-only artifacts.
        MANIFEST_VERSION="${{ steps.manifest-version.outputs.version }}"
        jq --arg ver "${MANIFEST_VERSION}" '.version_number = $ver' assets/manifest.json > assets/manifest.tmp.json
        mv assets/manifest.tmp.json assets/manifest.json
